# Configuração de áudio para Raspberry Pi (host Linux com ALSA/PulseAudio).
# Use junto com compose.yaml:
#   docker compose -f compose.yaml -f compose.rpi.yaml up -d
services:
  assistente:
    volumes:
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:ro
    group_add:
      - audio
